<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip the coin | DevChallenges</title>
    <!-- Importation de la favicon -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />
    <!-- Importation des styles -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Début du header -->
    <header>
      <h1 class="main__title">Flip the coin</h1>
      <p class="subtitle">Press the coin or the button to flip the coin</p>
    </header>
    <!-- Fin du header -->

    <!-- Début du main -->
    <main class="main__content">
      <section class="container">
        <div class="container__coin">
          <img src="img/heads.svg" alt="coin" class="coin" id="coin" />
          <img src="img/shadow.svg" alt="coin shadow" class="coin-shadow" />
        </div>
        <p class="container__result">Heads</p>
        <button class="container__btn">Random</button>
      </section>
    </main>
    <!-- Fin du main -->

    <!-- Début du footer -->
    <footer>
      <p class="footer__text">
        Created by
        <a class="user" href="https://github.com/aperbet56" target="_blank">
          aperbet56
        </a>
        - devChallenges.io
      </p>
    </footer>
    <!-- Fin du footer-->

    <!-- Importation du fichier JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
